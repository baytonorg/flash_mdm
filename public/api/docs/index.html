<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flash MDM API Docs</title>
    <link rel="stylesheet" href="./swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #0b1020;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .top {
        padding: 16px 20px;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #e5e7eb;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .top h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }
      .top p {
        margin: 6px 0 0;
        font-size: 13px;
        color: #cbd5e1;
      }
      #swagger-ui {
        max-width: 1280px;
        margin: 0 auto;
        background: #fff;
        min-height: calc(100vh - 76px);
      }
      .swagger-ui .topbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <h1>Flash MDM API</h1>
      <p>
        Use the Authorize button with a workspace or environment API key. Scope and RBAC are enforced server-side.
      </p>
    </div>
    <div id="swagger-ui"></div>
    <script src="./swagger-ui-bundle.js" crossorigin></script>
    <script src="./swagger-ui-standalone-preset.js" crossorigin></script>
    <script src="./swagger-init.js"></script>
  </body>
</html>
